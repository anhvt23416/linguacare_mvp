version: '3.8'

services:
  # --------------------------------------------------------
  # 1. PostgreSQL (OLTP) with pgvector for embeddings
  # --------------------------------------------------------
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: linguacare_postgres
    environment:
      POSTGRES_USER: linguacare_user
      POSTGRES_PASSWORD: linguacare_password
      POSTGRES_DB: linguacare_oltp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # --------------------------------------------------------
  # 2. PgBouncer (Connection Pooling for Postgres Stability)
  # --------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: linguacare_pgbouncer
    environment:
      DB_USER: linguacare_user
      DB_PASSWORD: linguacare_password
      DB_HOST: postgres
      DB_NAME: linguacare_oltp
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    depends_on:
      - postgres
    restart: unless-stopped

  # --------------------------------------------------------
  # 3. Neo4j (Graph Database for Mastery overlay & ZPD)
  # --------------------------------------------------------
  neo4j:
    image: neo4j:5.12.0
    container_name: linguacare_neo4j
    environment:
      NEO4J_AUTH: neo4j/linguacare_graph
      # Enable APOC and Graph Data Science plugins
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_PLUGINS: '["apoc"]'
      # Memory tuning to ensure stability and prevent OOM
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - ./schema/neo4j_init.cypher:/var/lib/neo4j/import/neo4j_init.cypher
      - ../../data:/var/lib/neo4j/import/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # --------------------------------------------------------
  # 4. ML Parsing Sidecar (FastAPI + ONNX)
  # --------------------------------------------------------
  ml_sidecar:
    build:
      context: ../linguacare_ml_sidecar
      dockerfile: Dockerfile
    container_name: linguacare_ml_sidecar
    ports:
      - "8000:8000"
    environment:
      # Hardware profile detection fallback: 'cpu' (Iris Xe) or 'cuda' (RTX 4060)
      HARDWARE_PROFILE: ${HARDWARE_PROFILE:-cpu}
      # Cloud Fallback (Gemini/OpenAI) for weak local hardware
      USE_CLOUD_FALLBACK: ${USE_CLOUD_FALLBACK:-true}
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-gemini} # gemini, openai, claude
      CLOUD_API_KEY: ${CLOUD_API_KEY:-}
    volumes:
      - ../linguacare_ml_sidecar:/app
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      # Configured to run on Iris Xe safely. 
      # To use the RTX 4060, pass --gpus all when running or override via docker-compose.override.yml
      resources:
        limits:
          cpus: '4.0'
          memory: 6G

volumes:
  postgres_data:
  neo4j_data:
  model_cache:
